<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920" width="800" height="920">
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#595959"/>
    </marker>
    <marker id="arrowRed5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowGreen5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4CAF50"/>
    </marker>
  </defs>
  <style>
    text { font-family: "Microsoft YaHei", "SimHei", sans-serif; font-size: 13px; fill: #333; }
    .title { font-size: 18px; font-weight: bold; fill: #1a1a2e; }
    .process { fill: #e8f4fd; stroke: #2196F3; stroke-width: 1.5; rx: 6; }
    .process text { fill: #1565C0; }
    .decision { fill: #fff3e0; stroke: #FF9800; stroke-width: 1.5; }
    .decision text { fill: #E65100; font-size: 12px; }
    .success { fill: #e8f5e9; stroke: #4CAF50; stroke-width: 1.5; rx: 6; }
    .success text { fill: #2E7D32; }
    .error { fill: #ffebee; stroke: #e74c3c; stroke-width: 1.5; rx: 6; }
    .error text { fill: #c62828; }
    .sub-step { fill: #f3e5f5; stroke: #9C27B0; stroke-width: 1; rx: 4; }
    .sub-step text { fill: #6A1B9A; font-size: 11.5px; }
    .schedule { fill: #e0f7fa; stroke: #00BCD4; stroke-width: 1.5; rx: 6; }
    .schedule text { fill: #006064; }
    .file { fill: #fff8e1; stroke: #FFC107; stroke-width: 1.5; rx: 6; }
    .file text { fill: #F57F17; }
    .label-no { font-size: 11px; fill: #e74c3c; font-weight: bold; }
    .label-yes { font-size: 11px; fill: #4CAF50; font-weight: bold; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">稽核数据生成与SFTP推送流程</text>

  <!-- Start: Scheduler -->
  <rect x="270" y="50" width="260" height="40" class="schedule" rx="20"/>
  <text x="400" y="75" text-anchor="middle">定时调度触发（每日02:00）</text>

  <line x1="400" y1="90" x2="400" y2="118" stroke="#595959" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- Data collection step -->
  <rect x="210" y="121" width="380" height="80" class="sub-step" rx="4"/>
  <text x="400" y="141" text-anchor="middle">数据采集：</text>
  <text x="400" y="158" text-anchor="middle">① 查询所有地址池信息</text>
  <text x="400" y="175" text-anchor="middle">② 查询所有IP地址及状态  ③ 查询所有分配记录</text>

  <line x1="400" y1="201" x2="400" y2="228" stroke="#595959" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- Audit comparison -->
  <rect x="170" y="231" width="460" height="90" class="sub-step" rx="4"/>
  <text x="400" y="251" text-anchor="middle">数据比对与稽核：</text>
  <text x="400" y="268" text-anchor="middle">① 地址池总量与实际IP数比对</text>
  <text x="400" y="285" text-anchor="middle">② 已分配IP与分配记录比对</text>
  <text x="400" y="302" text-anchor="middle">③ 到期未释放IP检测  ④ 孤立IP检测（无地址池/无设备）</text>

  <line x1="400" y1="321" x2="400" y2="348" stroke="#595959" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- Generate audit file -->
  <rect x="210" y="351" width="380" height="55" class="file" rx="6"/>
  <text x="400" y="371" text-anchor="middle">生成稽核数据文件（CSV/XML/JSON格式）</text>
  <text x="400" y="391" text-anchor="middle" font-size="12">文件命名规则：AUDIT_yyyyMMdd_HHmmss.csv</text>

  <line x1="400" y1="406" x2="400" y2="433" stroke="#595959" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- SFTP push -->
  <rect x="160" y="436" width="480" height="45" class="process" rx="6"/>
  <text x="400" y="463" text-anchor="middle">推送至资源中心SFTP服务器（sftp.resource-center.sn.cmcc.cn:22）</text>

  <line x1="400" y1="481" x2="400" y2="510" stroke="#595959" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- Decision: push success? -->
  <polygon points="400,513 490,548 400,583 310,548" class="decision"/>
  <text x="400" y="552" text-anchor="middle" class="decision">推送成功?</text>

  <!-- Yes → log -->
  <line x1="490" y1="548" x2="620" y2="548" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arrowGreen5)"/>
  <text x="545" y="540" class="label-yes">成功</text>
  <rect x="620" y="530" width="150" height="36" class="success" rx="6"/>
  <text x="695" y="553" text-anchor="middle">记录审计日志</text>

  <!-- No → retry -->
  <line x1="310" y1="548" x2="180" y2="548" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowRed5)"/>
  <text x="250" y="540" class="label-no">失败</text>

  <!-- Retry box -->
  <rect x="20" y="523" width="160" height="50" class="schedule" rx="6"/>
  <text x="100" y="545" text-anchor="middle">自动重试（最多3次）</text>
  <text x="100" y="563" text-anchor="middle" font-size="11">retry count ≤ 3</text>

  <!-- Arrow from retry back to SFTP push -->
  <line x1="100" y1="523" x2="100" y2="458" stroke="#FF9800" stroke-width="1.5"/>
  <line x1="100" y1="458" x2="155" y2="458" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="110" y="490" fill="#FF9800" font-size="11">重试</text>

  <!-- Retry exhausted → Decision -->
  <line x1="100" y1="573" x2="100" y2="620" stroke="#595959" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="65" y="600" fill="#e74c3c" font-size="11">3次重试后</text>

  <!-- Decision: retry success? -->
  <polygon points="100,623 190,658 100,693 10,658" class="decision"/>
  <text x="100" y="662" text-anchor="middle" class="decision">重试成功?</text>

  <!-- Yes → log -->
  <line x1="190" y1="658" x2="310" y2="658" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arrowGreen5)"/>
  <text x="240" y="650" class="label-yes">成功</text>
  <rect x="310" y="640" width="150" height="36" class="success" rx="6"/>
  <text x="385" y="663" text-anchor="middle">记录日志</text>

  <!-- No → manual intervention -->
  <line x1="100" y1="693" x2="100" y2="730" stroke="#595959" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="120" y="718" class="label-no">失败</text>
  <rect x="20" y="733" width="260" height="40" class="error" rx="6"/>
  <text x="150" y="758" text-anchor="middle">记录失败日志，人工介入</text>
</svg>